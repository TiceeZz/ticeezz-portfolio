<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
    <meta name="mobile-web-app-capable" content="yes" />
    <meta name="theme-color" content="#2B263B" />
    <title>Vibe Coding · 千岛</title>
    <style>
      #app-loader {
        position: fixed; inset: 0; z-index: 9999;
        display: flex; align-items: center; justify-content: center;
        background: #2B263B;
        transition: opacity 0.4s ease;
      }
      #app-loader.hidden { opacity: 0; pointer-events: none; }
      .loader-dot {
        width: 8px; height: 8px; margin: 0 4px;
        border-radius: 50%; background: #7B61FF;
        animation: loader-bounce 0.6s infinite alternate;
      }
      .loader-dot:nth-child(2) { animation-delay: 0.2s; }
      .loader-dot:nth-child(3) { animation-delay: 0.4s; }
      @keyframes loader-bounce {
        from { transform: translateY(0); opacity: 0.3; }
        to   { transform: translateY(-12px); opacity: 1; }
      }
    </style>
    <script>
      (function() {
        var W = 393, H = 850;
        function fit() {
          var s = Math.min(1, window.innerWidth / W, window.innerHeight / H);
          document.documentElement.style.setProperty('--app-scale', s);
        }
        fit();
        window.addEventListener('resize', fit);
      })();

      // Wait for React mount before hiding loader
      window.__vibeReady = false;
      function hideLoader() {
        var loader = document.getElementById('app-loader');
        if (!loader) return;
        loader.classList.add('hidden');
        setTimeout(function() { if (loader.parentNode) loader.remove(); }, 500);
      }
      // React will set __vibeReady=true after mount
      var checkReady = setInterval(function() {
        if (window.__vibeReady) {
          clearInterval(checkReady);
          hideLoader();
        }
      }, 100);
      // Fallback: hide loader after 10s no matter what
      setTimeout(function() { clearInterval(checkReady); hideLoader(); }, 10000);
    </script>
    <script type="module" crossorigin src="/vibe-demo/assets/index-DU39yOwQ.js"></script>
    <link rel="stylesheet" crossorigin href="/vibe-demo/assets/index-TMztbkZn.css">
  </head>
  <body>
    <div id="app-loader"><div class="loader-dot"></div><div class="loader-dot"></div><div class="loader-dot"></div></div>
    <div id="root"></div>
  </body>
</html>
